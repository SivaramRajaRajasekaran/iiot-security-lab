# Tells Mosquitto which port to listen on
listener 1883

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY CONFIGURATION (Disabled by default — Part of Phase 2: Security Lab)
# ─────────────────────────────────────────────────────────────────────────────
# By default, anonymous connections are allowed so you can run the basic
# monitoring lab without any setup.
#
# To enable authentication (Phase 2):
#   1. Uncomment the two lines below
#   2. Generate your own password file:
#      docker run --rm -it eclipse-mosquitto mosquitto_passwd -c /tmp/passwd <username>
#      Then copy the output into mosquitto/passwd
#   3. Restart: docker compose down && docker compose up -d
#
# Username used in this lab: simulator / nodered
# ─────────────────────────────────────────────────────────────────────────────

allow_anonymous true

# allow_anonymous false
# password_file /mosquitto/config/passwd